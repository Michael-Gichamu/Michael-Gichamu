<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Animated tech constellation">
  <defs>
    <radialGradient id="nebula" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#1f6feb" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5d6ff" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
    <filter id="softGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="300" fill="#0d1117"/>
  <ellipse cx="600" cy="150" rx="720" ry="210" fill="url(#nebula)"/>
  <circle cx="600" cy="150" r="110" fill="url(#coreGlow)"/>

  <!-- Starfield (twinkle) -->
  <g fill="#c9d1d9">
    <circle cx="60" cy="35" r="0.8"><animate attributeName="opacity" values="0.25;1;0.25" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="65" r="0.6"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="2.6s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="225" cy="22" r="0.9"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.4s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="55" r="0.7"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="395" cy="18" r="0.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="475" cy="72" r="0.8"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="3.2s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="555" cy="30" r="0.6"><animate attributeName="opacity" values="0.35;1;0.35" dur="2.4s" begin="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="60" r="0.9"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="725" cy="20" r="0.7"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.7s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="810" cy="50" r="0.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.8s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="895" cy="28" r="0.8"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="2.9s" begin="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="68" r="0.6"><animate attributeName="opacity" values="0.25;1;0.25" dur="3.3s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="1065" cy="25" r="0.7"><animate attributeName="opacity" values="0.35;1;0.35" dur="2.5s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="1140" cy="58" r="0.9"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="3.1s" begin="0.8s" repeatCount="indefinite"/></circle>

    <circle cx="40" cy="155" r="0.7"><animate attributeName="opacity" values="0.25;1;0.25" dur="3.5s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="1160" cy="148" r="0.8"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="2.7s" begin="1.6s" repeatCount="indefinite"/></circle>

    <circle cx="80" cy="245" r="0.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="165" cy="270" r="0.9"><animate attributeName="opacity" values="0.25;0.95;0.25" dur="3.6s" begin="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="240" r="0.5"><animate attributeName="opacity" values="0.35;1;0.35" dur="2.5s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="335" cy="278" r="0.7"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.2s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="252" r="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="510" cy="275" r="0.6"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.4s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="595" cy="248" r="0.9"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="2.6s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="270" r="0.5"><animate attributeName="opacity" values="0.25;1;0.25" dur="3.8s" begin="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="765" cy="245" r="0.7"><animate attributeName="opacity" values="0.35;0.95;0.35" dur="2.7s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="278" r="0.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.3s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="935" cy="250" r="0.8"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.1s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="273" r="0.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="1105" cy="248" r="0.7"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="3.5s" begin="0.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Orbital rings (elliptical) -->
  <g transform="translate(600 150)" fill="none" stroke-width="0.6">
    <ellipse rx="540" ry="62" stroke="#1f6feb" stroke-opacity="0.35" stroke-dasharray="3 9"/>
    <ellipse rx="450" ry="52" stroke="#58a6ff" stroke-opacity="0.28"/>
    <ellipse rx="360" ry="42" stroke="#1f6feb" stroke-opacity="0.35" stroke-dasharray="2 6"/>
    <ellipse rx="270" ry="32" stroke="#58a6ff" stroke-opacity="0.28"/>
    <ellipse rx="180" ry="22" stroke="#1f6feb" stroke-opacity="0.35" stroke-dasharray="1 4"/>
  </g>

  <!-- Orbiting nodes -->
  <!-- Use animateMotion along elliptical arc paths -->
  <g transform="translate(600 150)">

    <!-- Ring 1 (outermost) -->
    <g>
      <circle r="3.5" fill="#58a6ff" filter="url(#glow)">
        <animateMotion dur="28s" repeatCount="indefinite" rotate="auto">
          <mpath href="#orbit1"/>
        </animateMotion>
      </circle>
      <circle r="2.2" fill="#a5d6ff">
        <animateMotion dur="28s" repeatCount="indefinite" rotate="auto" begin="-14s">
          <mpath href="#orbit1"/>
        </animateMotion>
      </circle>
    </g>

    <!-- Ring 2 -->
    <g>
      <circle r="3" fill="#D97757" filter="url(#glow)">
        <animateMotion dur="22s" repeatCount="indefinite" rotate="auto" begin="-3s">
          <mpath href="#orbit2"/>
        </animateMotion>
      </circle>
    </g>

    <!-- Ring 3 -->
    <g>
      <circle r="2.8" fill="#58a6ff" filter="url(#glow)">
        <animateMotion dur="18s" repeatCount="indefinite" rotate="auto" begin="-9s">
          <mpath href="#orbit3"/>
        </animateMotion>
      </circle>
      <circle r="2" fill="#a5d6ff">
        <animateMotion dur="18s" repeatCount="indefinite" rotate="auto" begin="-1s">
          <mpath href="#orbit3"/>
        </animateMotion>
      </circle>
    </g>

    <!-- Ring 4 -->
    <g>
      <circle r="2.6" fill="#D97757" filter="url(#glow)">
        <animateMotion dur="14s" repeatCount="indefinite" rotate="auto">
          <mpath href="#orbit4"/>
        </animateMotion>
      </circle>
    </g>

    <!-- Ring 5 (innermost) -->
    <g>
      <circle r="2.4" fill="#58a6ff" filter="url(#glow)">
        <animateMotion dur="10s" repeatCount="indefinite" rotate="auto" begin="-5s">
          <mpath href="#orbit5"/>
        </animateMotion>
      </circle>
    </g>

    <!-- Hidden paths used by animateMotion (positioned at translated origin) -->
    <path id="orbit1" d="M 540 0 A 540 62 0 1 1 -540 0 A 540 62 0 1 1 540 0" fill="none" stroke="none"/>
    <path id="orbit2" d="M 450 0 A 450 52 0 1 0 -450 0 A 450 52 0 1 0 450 0" fill="none" stroke="none"/>
    <path id="orbit3" d="M 360 0 A 360 42 0 1 1 -360 0 A 360 42 0 1 1 360 0" fill="none" stroke="none"/>
    <path id="orbit4" d="M 270 0 A 270 32 0 1 0 -270 0 A 270 32 0 1 0 270 0" fill="none" stroke="none"/>
    <path id="orbit5" d="M 180 0 A 180 22 0 1 1 -180 0 A 180 22 0 1 1 180 0" fill="none" stroke="none"/>

  </g>

  <!-- Central core: counter-rotating hexagons -->
  <g transform="translate(600 150)" filter="url(#softGlow)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="24s" repeatCount="indefinite"/>
      <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="none" stroke="#58a6ff" stroke-width="1.4" stroke-opacity="0.9"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="60" to="-300" dur="18s" repeatCount="indefinite"/>
      <polygon points="0,-11 10,-5.5 10,5.5 0,11 -10,5.5 -10,-5.5" fill="none" stroke="#a5d6ff" stroke-width="1" stroke-opacity="0.8"/>
    </g>
    <circle r="3" fill="#a5d6ff">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
